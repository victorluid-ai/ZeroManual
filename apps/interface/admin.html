<!DOCTYPE html>
<html lang="es" data-theme="paper">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroManual · Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='none' stroke='%230e1116' stroke-width='2'/><circle cx='16' cy='16' r='8' fill='%234f46e5'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f6f7f9;
      --bg-2:     #eff1f4;
      --bg-3:     #e9edf3;
      --line:     #e6e9ee;
      --fg:       #0e1116;
      --fg-2:     #3a4150;
      --fg-3:     #6b7280;
      --accent:   #4f46e5;
      --accent-h: #4338ca;
      --ok:       #047857;
      --warn:     #b7791f;
      --err:      #e5484d;
      --r:        14px;
      --r-sm:     10px;
      --shadow:   0 1px 2px rgba(14,17,22,0.04), 0 8px 24px rgba(14,17,22,0.06);
      --font:     'IBM Plex Sans', system-ui, sans-serif;
      --display:  'Space Grotesk', system-ui, sans-serif;
    }
    .login-brand-name, .topbar-brand-name, .login-title, .card-title, .modal-title, .agent-name { font-family: var(--display); }
    .login-title { font-size: 22px; letter-spacing: -.01em; }
    .btn { font-weight: 600; }

    html, body { height: 100%; }
    body { font-family: var(--font); background: var(--bg); color: var(--fg); font-size: 14px; line-height: 1.5; }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; transition: opacity .2s;
    }
    #login-overlay.hidden { opacity: 0; pointer-events: none; }

    .login-card {
      background: #fff; border: 1px solid var(--line); border-radius: var(--r);
      box-shadow: var(--shadow); padding: 40px 36px; width: 340px;
    }
    .login-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .login-brand-mark {
      width: 28px; height: 28px; border: 1.5px solid var(--fg); border-radius: 50%;
      position: relative; display: inline-block; flex-shrink: 0;
    }
    .login-brand-mark::after {
      content: ""; position: absolute; inset: 5px;
      background: var(--accent); border-radius: 50%;
      animation: pulse 2.4s ease-in-out infinite;
    }
    .login-brand-name { font-size: 17px; font-weight: 600; letter-spacing: -.01em; }
    .login-brand-name span { font-weight: 300; }
    .login-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .login-sub { color: var(--fg-3); margin-bottom: 24px; font-size: 13px; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--fg-2); margin-bottom: 5px; }
    .form-group input, .form-group select {
      width: 100%; padding: 9px 11px;
      background: var(--bg); border: 1px solid var(--line); border-radius: var(--r-sm);
      font: inherit; font-size: 14px; color: var(--fg); outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px; border-radius: var(--r-sm); border: 1px solid transparent;
      font: inherit; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none;
      transition: background .15s, border-color .15s, color .15s; white-space: nowrap;
    }
    .btn.primary { background: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-h); }
    .btn.ghost { background: transparent; border-color: var(--line); color: var(--fg-2); }
    .btn.ghost:hover { background: var(--bg-2); }
    .btn.danger { background: transparent; border-color: var(--err); color: var(--err); }
    .btn.danger:hover { background: var(--err); color: #fff; }
    .btn.sm { padding: 5px 10px; font-size: 12px; }
    .btn.full { width: 100%; justify-content: center; margin-top: 8px; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .error-msg { color: var(--err); font-size: 12px; margin-top: 8px; min-height: 16px; }

    /* ── App shell ── */
    #app { display: flex; flex-direction: column; height: 100%; }

    .topbar {
      background: #fff; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; padding: 0 20px; height: 52px; gap: 16px; flex-shrink: 0;
    }
    .topbar-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--fg); }
    .topbar-brand-mark {
      width: 22px; height: 22px; border: 1.5px solid var(--fg); border-radius: 50%;
      position: relative; display: inline-block; flex-shrink: 0;
    }
    .topbar-brand-mark::after {
      content: ""; position: absolute; inset: 4px;
      background: var(--accent); border-radius: 50%;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.55); opacity: 0.7; } }
    .topbar-brand-name { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
    .topbar-brand-name span { font-weight: 300; }
    .topbar-divider { width: 1px; height: 18px; background: var(--line); }
    .topbar-sub { font-size: 12px; color: var(--fg-3); }
    .topbar-spacer { flex: 1; }
    .topbar-user { font-size: 12px; color: var(--fg-3); }
    .topbar-user strong { color: var(--fg-2); }

    /* ── Tabs ── */
    .tabs { display: flex; padding: 0 20px; background: #fff; border-bottom: 1px solid var(--line); gap: 2px; flex-shrink: 0; }
    .tab {
      padding: 11px 14px; font-size: 13px; font-weight: 500; color: var(--fg-3);
      border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s; font-family: inherit;
    }
    .tab:hover { color: var(--fg); }
    .tab.on { color: var(--fg); border-bottom-color: var(--accent); }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 24px 20px; }

    /* ── Cards / panels ── */
    .card {
      background: #fff; border: 1px solid var(--line); border-radius: var(--r);
      padding: 20px; margin-bottom: 16px;
    }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--fg); }
    .card-sub { font-size: 12px; color: var(--fg-3); margin-top: 2px; }

    /* ── Table ── */
    .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tbl th { text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--fg-3); padding: 0 10px 8px; border-bottom: 1px solid var(--line); }
    .tbl td { padding: 10px; border-bottom: 1px solid var(--bg-2); vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: var(--bg); }

    /* ── Status badges ── */
    .badge {
      display: inline-block; padding: 2px 7px; border-radius: 20px;
      font-size: 11px; font-weight: 500; line-height: 1.5;
    }
    .badge.ok { background: #e3f3eb; color: #1f6e49; }
    .badge.warn { background: #faf0da; color: #8a6516; }
    .badge.err { background: #fbe7e4; color: #9e2f22; }
    .badge.neu { background: var(--bg-2); color: var(--fg-3); }

    /* ── Agents grid ── */
    .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .agent-card {
      background: var(--bg); border: 1px solid var(--line); border-radius: var(--r);
      padding: 14px; transition: border-color .15s;
    }
    .agent-card:hover { border-color: var(--accent); }
    .agent-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .agent-desc { font-size: 12px; color: var(--fg-3); line-height: 1.4; }

    /* ── NL box ── */
    .nl-box { display: flex; gap: 8px; margin-bottom: 16px; }
    .nl-box input { flex: 1; padding: 9px 11px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--r-sm); font: inherit; font-size: 14px; color: var(--fg); outline: none; }
    .nl-box input:focus { border-color: var(--accent); }
    .nl-result { font-size: 13px; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 12px; white-space: pre-wrap; font-family: 'JetBrains Mono', monospace; display: none; }
    .nl-result.show { display: block; }

    /* ── Approval item ── */
    .approval-item { border: 1px solid var(--line); border-radius: var(--r-sm); padding: 14px; margin-bottom: 8px; background: var(--bg); }
    .approval-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .approval-meta { font-size: 11px; color: var(--fg-3); margin-top: 4px; }
    .approval-payload { font-size: 12px; background: var(--bg-2); border-radius: var(--r-sm); padding: 8px; margin-top: 8px; font-family: monospace; white-space: pre-wrap; max-height: 120px; overflow-y: auto; }
    .approval-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 48px 16px; color: var(--fg-3); font-size: 13px; }
    .empty svg { width: 36px; height: 36px; margin-bottom: 10px; opacity: .4; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 32px; color: var(--fg-3); font-size: 13px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--fg); color: var(--bg); border-radius: var(--r-sm);
      padding: 10px 16px; font-size: 13px; font-weight: 500;
      transform: translateY(16px); opacity: 0; transition: transform .2s, opacity .2s;
      pointer-events: none; z-index: 200;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok { background: var(--ok); }
    #toast.err { background: var(--err); }

    /* ── Modal ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.25);
      display: flex; align-items: center; justify-content: center; z-index: 150;
    }
    .modal-bg.hidden { display: none; }
    .modal { background: #fff; border-radius: var(--r); padding: 28px 24px; width: 340px; box-shadow: var(--shadow); }
    .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-mark"></div>
      <div class="login-brand-name">Zero<span>Manual</span></div>
    </div>
    <div class="login-title">Admin comercial</div>
    <div class="login-sub">Usuarios, clientes y automatizaciones. Facturación en OpsCenter.</div>
    <div class="form-group">
      <label for="inp-username">Usuario</label>
      <input id="inp-username" type="text" autocomplete="username" placeholder="admin" />
    </div>
    <div class="form-group">
      <label for="inp-password">Contraseña</label>
      <input id="inp-password" type="password" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="btn primary full" id="btn-login">Entrar →</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <a class="topbar-brand" href="/">
      <div class="topbar-brand-mark"></div>
      <div class="topbar-brand-name">Zero<span>Manual</span></div>
    </a>
    <div class="topbar-divider"></div>
    <div class="topbar-sub">Admin comercial</div>
    <div class="topbar-spacer"></div>
    <a class="btn ghost sm" id="btn-ops" href="#" target="_blank" rel="noopener">Abrir OpsCenter</a>
    <div class="topbar-user">Sesión: <strong id="lbl-user">—</strong></div>
    <button class="btn ghost sm" id="btn-logout">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab on" data-tab="clients">Clientes</button>
    <button class="tab" data-tab="users">Usuarios</button>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="modal-bg hidden" id="modal-user">
  <div class="modal">
    <div class="modal-title">Nuevo usuario</div>
    <div class="form-group"><label>Usuario</label><input id="new-username" type="text" /></div>
    <div class="form-group"><label>Email</label><input id="new-email" type="email" /></div>
    <div class="form-group"><label>Contraseña</label><input id="new-password" type="password" /></div>
    <div class="form-group"><label>Rol</label>
      <select id="new-role"><option value="admin">admin</option><option value="viewer">viewer</option></select>
    </div>
    <div class="error-msg" id="new-user-error"></div>
    <div class="modal-footer">
      <button class="btn ghost" id="modal-cancel">Cancelar</button>
      <button class="btn primary" id="modal-confirm">Crear usuario</button>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="modal-client">
  <div class="modal">
    <div class="modal-title">Nuevo cliente</div>
    <div class="form-group"><label>Negocio</label><input id="new-client-name" type="text" /></div>
    <div class="form-group"><label>Email</label><input id="new-client-email" type="email" /></div>
    <div class="form-group"><label>Contraseña</label><input id="new-client-password" type="password" /></div>
    <div class="error-msg" id="new-client-error"></div>
    <div class="modal-footer">
      <button class="btn ghost" id="modal-client-cancel">Cancelar</button>
      <button class="btn primary" id="modal-client-confirm">Crear cliente</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  'use strict';
  let token = sessionStorage.getItem('mz_token') || null;
  let currentUser = null;
  let activeTab = 'clients';
  let opsUrl = null;
  const $ = id => document.getElementById(id);

  let toastTimer = null;
  function toast(msg, kind = '') {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'show' + (kind ? ' ' + kind : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 2800);
  }
  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }
  async function api(method, path, body) {
    const opts = { method, headers: authHeaders() };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    if (r.status === 401) { doLogout(); return null; }
    if (!r.ok) {
      const t = await r.text();
      let detail = t;
      try { detail = JSON.parse(t).detail || t; } catch {}
      throw new Error(detail);
    }
    return r.json();
  }
  function dateStr(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('es-ES', { dateStyle: 'short', timeStyle: 'short' });
  }
  function escHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function tryLogin() {
    const username = $('inp-username').value.trim();
    const password = $('inp-password').value;
    $('login-error').textContent = '';
    try {
      const r = await fetch('/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error de login');
      const data = await r.json();
      token = data.token;
      currentUser = data.user;
      sessionStorage.setItem('mz_token', token);
      showApp();
    } catch (e) { $('login-error').textContent = e.message; }
  }

  function doLogout() {
    if (token) fetch('/auth/logout', { method: 'POST', headers: authHeaders() }).catch(() => {});
    token = null; currentUser = null;
    sessionStorage.removeItem('mz_token');
    $('login-overlay').classList.remove('hidden');
  }

  async function showApp() {
    $('login-overlay').classList.add('hidden');
    $('lbl-user').textContent = currentUser ? currentUser.username : '—';
    await loadTab(activeTab);
  }

  async function restoreSession() {
    if (!token) return;
    try {
      const r = await fetch('/auth/me', { headers: authHeaders() });
      if (!r.ok) { doLogout(); return; }
      const data = await r.json();
      currentUser = data.user;
      showApp();
    } catch { doLogout(); }
  }

  async function loadTab(name) {
    activeTab = name;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === name));
    const c = $('content');
    if (name === 'users') await tabUsers(c);
    else await tabClients(c);
  }

  async function tabUsers(c) {
    c.innerHTML = '<div class="loading">Cargando…</div>';
    try {
      const data = await api('GET', '/api/v1/admin/users');
      if (!data) return;
      const users = data.users || [];
      c.innerHTML = `<div class="card">
        <div class="card-head">
          <div><div class="card-title">Usuarios admin</div><div class="card-sub">${users.length} usuario(s)</div></div>
          <button class="btn primary sm" id="btn-new-user">+ Nuevo usuario</button>
        </div>
        <table class="tbl">
          <thead><tr><th>Usuario</th><th>Email</th><th>Rol</th><th>Creado</th><th></th></tr></thead>
          <tbody id="users-tbody">${users.map(u => userRow(u)).join('')}</tbody>
        </table>
      </div>`;
      $('btn-new-user').onclick = () => { $('modal-user').classList.remove('hidden'); };
      document.querySelectorAll('.del-user-btn').forEach(btn => {
        btn.onclick = async () => {
          if (!confirm('¿Eliminar usuario?')) return;
          await api('DELETE', `/api/v1/admin/users/${btn.dataset.id}`);
          toast('Usuario eliminado'); loadTab('users');
        };
      });
    } catch (e) { c.innerHTML = `<div class="card"><div class="empty">${escHtml(e.message)}</div></div>`; }
  }

  function userRow(u) {
    const isSelf = currentUser && currentUser.user_id === u.user_id;
    return `<tr>
      <td><strong>${escHtml(u.username)}</strong>${isSelf ? ' <span class="badge neu">tú</span>' : ''}</td>
      <td>${escHtml(u.email || '—')}</td>
      <td><span class="badge neu">${escHtml(u.role || '—')}</span></td>
      <td>${dateStr(u.created_at)}</td>
      <td>${isSelf ? '' : `<button class="btn danger sm del-user-btn" data-id="${u.user_id}">Eliminar</button>`}</td>
    </tr>`;
  }

  async function tabClients(c) {
    c.innerHTML = '<div class="loading">Cargando…</div>';
    try {
      const data = await api('GET', '/api/v1/admin/clients');
      if (!data) return;
      if (data.ops_url) {
        opsUrl = data.ops_url;
        $('btn-ops').href = opsUrl.replace(/\/$/, '') + '/admin';
      } else {
        $('btn-ops').href = 'http://localhost:8091/admin';
      }
      const clients = data.clients || [];
      c.innerHTML = `<div class="card">
        <div class="card-head">
          <div><div class="card-title">Clientes del portal</div><div class="card-sub">${clients.length} cliente(s)</div></div>
          <button class="btn primary sm" id="btn-new-client">+ Nuevo cliente</button>
        </div>
        ${clients.length ? `<table class="tbl">
          <thead><tr><th>Negocio</th><th>Email</th><th>Google</th><th>Automatizaciones</th><th>Creado</th><th></th></tr></thead>
          <tbody>${clients.map(cl => clientRow(cl)).join('')}</tbody>
        </table>` : '<div class="empty">No hay clientes todavía.</div>'}
      </div>`;
      $('btn-new-client').onclick = () => { $('modal-client').classList.remove('hidden'); };
      document.querySelectorAll('.del-client-btn').forEach(btn => {
        btn.onclick = async () => {
          if (!confirm('¿Eliminar cliente?')) return;
          await api('DELETE', `/api/v1/admin/clients/${btn.dataset.id}`);
          toast('Cliente eliminado'); loadTab('clients');
        };
      });
    } catch (e) { c.innerHTML = `<div class="card"><div class="empty">${escHtml(e.message)}</div></div>`; }
  }

  function clientRow(cl) {
    const autos = (cl.automations || []).filter(a => a.status === 'active').map(a => a.automation_type).join(', ') || '—';
    const g = cl.google_connected ? (cl.google_email || 'conectado') : 'no';
    return `<tr>
      <td><strong>${escHtml(cl.name)}</strong></td>
      <td>${escHtml(cl.email)}</td>
      <td><span class="badge ${cl.google_connected ? 'ok' : 'neu'}">${escHtml(g)}</span></td>
      <td>${escHtml(autos)}</td>
      <td>${dateStr(cl.created_at)}</td>
      <td><button class="btn danger sm del-client-btn" data-id="${cl.client_id}">Eliminar</button></td>
    </tr>`;
  }

  $('btn-login').onclick = tryLogin;
  $('inp-password').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  $('btn-logout').onclick = doLogout;
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => loadTab(t.dataset.tab));
  $('modal-cancel').onclick = () => $('modal-user').classList.add('hidden');
  $('modal-confirm').onclick = async () => {
    try {
      await api('POST', '/api/v1/admin/users', {
        username: $('new-username').value.trim(),
        email: $('new-email').value.trim(),
        password: $('new-password').value,
        role: $('new-role').value,
      });
      $('modal-user').classList.add('hidden');
      toast('Usuario creado', 'ok');
      loadTab('users');
    } catch (e) { $('new-user-error').textContent = e.message; }
  };
  $('modal-client-cancel').onclick = () => $('modal-client').classList.add('hidden');
  $('modal-client-confirm').onclick = async () => {
    try {
      await api('POST', '/api/v1/admin/clients', {
        name: $('new-client-name').value.trim(),
        email: $('new-client-email').value.trim(),
        password: $('new-client-password').value,
      });
      $('modal-client').classList.add('hidden');
      toast('Cliente creado', 'ok');
      loadTab('clients');
    } catch (e) { $('new-client-error').textContent = e.message; }
  };

  restoreSession();
})();
</script>
</body>
</html>
