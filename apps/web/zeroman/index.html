<style>
:root {

}
[data-theme="dark"] {

}
[data-theme="contrast"] {
  --bg: #000; --bg-2: #0a0a0a; --bg-3: #161616;
  --line: #2a2a2a; --line-2: #444;
  --fg: #fff; --fg-2: #aaa; --fg-3: #666;

}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
body { font-family: var(--f-display); font-feature-settings: "ss01","ss02","cv11"; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
::selection { background: var(--accent); color: var(--accent-fg); }
.mono { font-family: var(--f-mono); font-weight: 400; letter-spacing: -0.01em; }
.serif { font-family: var(--f-serif); font-weight: 400; }
.eyebrow { font-family: var(--f-display); font-weight: 500; font-size: 12.5px; letter-spacing: 0.02em; color: var(--fg-3); }
.frame { max-width: 1440px; margin: 0 auto; padding: 0 40px; position: relative; }
@media (max-width: 720px) { .frame { padding: 0 20px; } }
.nav { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; gap: 32px; }

.brand-mark::after { content: ""; position: absolute; inset: 4px; background: var(--accent); border-radius: 50%; animation: pulse 2.4s ease-in-out infinite; }

.view-stage { display: block; }

.nav-cta { display: flex; align-items: center; gap: 10px; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 6px; font-size: 13.5px; font-weight: 500; letter-spacing: -0.01em; border: 1px solid transparent; transition: all 0.15s; background: transparent; color: var(--fg); }
.btn:hover { background: var(--bg-3); }

.hero { position: relative; padding: 36px 0 64px; border-bottom: 1px solid var(--line); }
.hero-grid { position: absolute; inset: 0; background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px); background-size: 48px 48px; mask-image: radial-gradient(ellipse 60% 50% at 50% 30%, #000 30%, transparent 75%); pointer-events: none; }

.hero-tag { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px 5px 10px; border: 1px solid var(--line); border-radius: 100px; font-family: var(--f-display); font-weight: 500; font-size: 12.5px; color: var(--fg-2); background: color-mix(in srgb, var(--bg-2) 80%, white 20%); margin-bottom: 28px; letter-spacing: -0.005em; }

.hero-cta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.rv-card { background: #ffffff; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; box-shadow: 0 20px 50px -28px rgba(27,32,48,0.18), 0 2px 6px -2px rgba(27,32,48,0.06); position: relative; }

.rv-r-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }

.rv-r-title { font-family: var(--f-display); font-weight: 500; font-size: 14px; color: var(--fg); margin-bottom: 5px; letter-spacing: -0.005em; }

.rv-draft { opacity: 0; transform: translateY(8px); transition: opacity 0.4s ease, transform 0.4s cubic-bezier(.2,.7,.3,1); border: 1px solid var(--line); border-radius: 10px; background: linear-gradient(to bottom, color-mix(in srgb, var(--accent) 5%, transparent), transparent); padding: 12px 14px 12px; }

.lang-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 100px; padding: 2px; background: var(--bg-2); margin-right: 8px; }

section { position: relative; }
.section-pad { padding: 120px 0; }
.section-head { display: grid; grid-template-columns: 240px 1fr; gap: 64px; margin-bottom: 64px; }

.cap-list { border-top: 1px solid var(--line); }

@media (max-width: 820px) { .cap-summary { grid-template-columns: 32px 1fr 32px; gap: 12px; padding: 14px 4px; } .cap-summary .tags { display: none; } .cap-summary h3 { font-size: 17px; } .cap-row[data-open="true"] .cap-detail { padding: 0 4px 18px 44px; } .cap-row[data-open="true"] .cap-detail .tags-mobile { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; } .cap-detail .tags-mobile span { font-family: var(--f-display); font-size: 11.5px; font-weight: 500; padding: 2px 9px; border: 1px solid var(--line); border-radius: 100px; color: var(--fg-3); } }

.steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; position: relative; }

          return next;
        });
