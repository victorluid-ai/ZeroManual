<!DOCTYPE html>
<html lang="es" data-theme="paper">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroManual · Admin web</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='none' stroke='%230e1116' stroke-width='2'/><circle cx='16' cy='16' r='8' fill='%234f46e5'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f6f7f9; --bg-2: #eff1f4; --line: #e6e9ee; --fg: #0e1116;
      --fg-2: #3a4150; --fg-3: #6b7280; --accent: #4f46e5; --accent-h: #4338ca;
      --ok: #047857; --err: #e5484d; --r: 14px; --r-sm: 10px;
      --shadow: 0 1px 2px rgba(14,17,22,0.04), 0 8px 24px rgba(14,17,22,0.06);
      --font: 'IBM Plex Sans', system-ui, sans-serif;
      --display: 'Space Grotesk', system-ui, sans-serif;
    }
    .login-brand-name, .topbar-brand-name, .login-title, .card-title, .modal-title { font-family: var(--display); }
    .btn { font-weight: 600; }
    html, body { height: 100%; }
    body { font-family: var(--font); background: var(--bg); color: var(--fg); font-size: 14px; line-height: 1.5; }
    #login-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    #login-overlay.hidden { opacity: 0; pointer-events: none; }
    .login-card {
      background: #fff; border: 1px solid var(--line); border-radius: var(--r);
      box-shadow: var(--shadow); padding: 40px 36px; width: 340px;
    }
    .login-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .login-brand-mark {
      width: 28px; height: 28px; border: 1.5px solid var(--fg); border-radius: 50%;
      position: relative; display: inline-block; flex-shrink: 0;
    }
    .login-brand-mark::after {
      content: ""; position: absolute; inset: 5px; background: var(--accent); border-radius: 50%;
      animation: pulse 2.4s ease-in-out infinite;
    }
    .login-brand-name { font-size: 17px; font-weight: 600; }
    .login-brand-name span { font-weight: 300; }
    .login-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .login-sub { color: var(--fg-3); margin-bottom: 24px; font-size: 13px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--fg-2); margin-bottom: 5px; }
    .form-group input, .form-group select {
      width: 100%; padding: 9px 11px; background: var(--bg); border: 1px solid var(--line);
      border-radius: var(--r-sm); font: inherit; font-size: 14px; color: var(--fg); outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px;
      border-radius: var(--r-sm); border: 1px solid transparent; font: inherit; font-size: 13px;
      cursor: pointer; text-decoration: none; white-space: nowrap;
    }
    .btn.primary { background: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-h); }
    .btn.ghost { background: transparent; border-color: var(--line); color: var(--fg-2); }
    .btn.danger { background: transparent; border-color: var(--err); color: var(--err); }
    .btn.danger:hover { background: var(--err); color: #fff; }
    .btn.sm { padding: 5px 10px; font-size: 12px; }
    .btn.full { width: 100%; justify-content: center; margin-top: 8px; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .error-msg { color: var(--err); font-size: 12px; margin-top: 8px; min-height: 16px; }
    #app { display: flex; flex-direction: column; height: 100%; }
    .topbar {
      background: #fff; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; padding: 0 20px; height: 52px; gap: 16px; flex-shrink: 0;
    }
    .topbar-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--fg); }
    .topbar-brand-mark {
      width: 22px; height: 22px; border: 1.5px solid var(--fg); border-radius: 50%;
      position: relative; display: inline-block; flex-shrink: 0;
    }
    .topbar-brand-mark::after {
      content: ""; position: absolute; inset: 4px; background: var(--accent); border-radius: 50%;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.55); opacity: 0.7; } }
    .topbar-brand-name { font-size: 15px; font-weight: 600; }
    .topbar-brand-name span { font-weight: 300; }
    .topbar-divider { width: 1px; height: 18px; background: var(--line); }
    .topbar-sub { font-size: 12px; color: var(--fg-3); }
    .topbar-spacer { flex: 1; }
    .topbar-user { font-size: 12px; color: var(--fg-3); }
    .topbar-user strong { color: var(--fg-2); }
    .tabs { display: flex; padding: 0 20px; background: #fff; border-bottom: 1px solid var(--line); gap: 2px; flex-shrink: 0; }
    .tab {
      padding: 11px 14px; font-size: 13px; font-weight: 500; color: var(--fg-3);
      border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent;
      font-family: inherit;
    }
    .tab:hover { color: var(--fg); }
    .tab.on { color: var(--fg); border-bottom-color: var(--accent); }
    .content { flex: 1; overflow-y: auto; padding: 24px 20px; }
    .card {
      background: #fff; border: 1px solid var(--line); border-radius: var(--r);
      padding: 20px; margin-bottom: 16px;
    }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 600; }
    .card-sub { font-size: 12px; color: var(--fg-3); margin-top: 2px; }
    .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tbl th {
      text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .04em;
      text-transform: uppercase; color: var(--fg-3); padding: 0 10px 8px; border-bottom: 1px solid var(--line);
    }
    .tbl td { padding: 10px; border-bottom: 1px solid var(--bg-2); vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block; padding: 2px 7px; border-radius: 20px;
      font-size: 11px; font-weight: 500; background: var(--bg-2); color: var(--fg-3);
    }
    .empty { text-align: center; padding: 48px 16px; color: var(--fg-3); font-size: 13px; }
    .loading { text-align: center; padding: 32px; color: var(--fg-3); font-size: 13px; }
    #toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--fg); color: var(--bg);
      border-radius: var(--r-sm); padding: 10px 16px; font-size: 13px; font-weight: 500;
      transform: translateY(16px); opacity: 0; transition: transform .2s, opacity .2s;
      pointer-events: none; z-index: 200;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok { background: var(--ok); }
    #toast.err { background: var(--err); }
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.25);
      display: flex; align-items: center; justify-content: center; z-index: 150;
    }
    .modal-bg.hidden { display: none; }
    .modal { background: #fff; border-radius: var(--r); padding: 28px 24px; width: 340px; box-shadow: var(--shadow); }
    .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .hint {
      margin-bottom: 16px; padding: 12px 14px; background: var(--bg-2); border: 1px solid var(--line);
      border-radius: var(--r-sm); font-size: 12px; color: var(--fg-2);
    }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-mark"></div>
      <div class="login-brand-name">Zero<span>Manual</span></div>
    </div>
    <div class="login-title">Admin web</div>
    <div class="login-sub">Usuarios y clientes del portal. Facturación y agentes están en OpsCenter.</div>
    <div class="form-group">
      <label for="inp-username">Usuario</label>
      <input id="inp-username" type="text" autocomplete="username" placeholder="admin" />
    </div>
    <div class="form-group">
      <label for="inp-password">Contraseña</label>
      <input id="inp-password" type="password" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="btn primary full" id="btn-login">Entrar →</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <a class="topbar-brand" href="/">
      <div class="topbar-brand-mark"></div>
      <div class="topbar-brand-name">Zero<span>Manual</span></div>
    </a>
    <div class="topbar-divider"></div>
    <div class="topbar-sub">Gestión web</div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user">Sesión: <strong id="lbl-user">—</strong></div>
    <button class="btn ghost sm" id="btn-logout">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab on" data-tab="clients">Clientes</button>
    <button class="tab" data-tab="users">Usuarios admin</button>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="modal-bg hidden" id="modal-user">
  <div class="modal">
    <div class="modal-title">Nuevo usuario admin</div>
    <div class="form-group">
      <label>Usuario</label>
      <input id="new-username" type="text" placeholder="nombre" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input id="new-email" type="email" placeholder="correo@ejemplo.com" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input id="new-password" type="password" placeholder="••••••••" />
    </div>
    <div class="form-group">
      <label>Rol</label>
      <select id="new-role">
        <option value="admin">admin</option>
        <option value="viewer">viewer</option>
      </select>
    </div>
    <div class="error-msg" id="new-user-error"></div>
    <div class="modal-footer">
      <button class="btn ghost" id="modal-cancel">Cancelar</button>
      <button class="btn primary" id="modal-confirm">Crear usuario</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  'use strict';

  let token = sessionStorage.getItem('mz_token') || null;
  let currentUser = null;
  let activeTab = 'clients';

  const $ = id => document.getElementById(id);
  let toastTimer = null;
  function toast(msg, kind = '') {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'show' + (kind ? ' ' + kind : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 2800);
  }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }

  async function api(method, path, body) {
    const opts = { method, headers: authHeaders() };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    if (r.status === 401) { doLogout(); return null; }
    if (!r.ok) {
      const t = await r.text();
      let detail = t;
      try { detail = JSON.parse(t).detail || t; } catch {}
      throw new Error(detail);
    }
    return r.json();
  }

  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function dateStr(v) {
    if (!v) return '—';
    try { return new Date(v).toLocaleString('es-ES', { dateStyle: 'short', timeStyle: 'short' }); }
    catch { return String(v); }
  }

  async function doLogin() {
    const username = $('inp-username').value.trim();
    const password = $('inp-password').value;
    if (!username || !password) { $('login-error').textContent = 'Completa usuario y contraseña.'; return; }
    $('login-error').textContent = '';
    const btn = $('btn-login');
    btn.disabled = true; btn.textContent = 'Entrando…';
    try {
      const r = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || 'Error de login');
      token = data.token;
      sessionStorage.setItem('mz_token', token);
      currentUser = data.user;
      showApp();
    } catch (e) {
      $('login-error').textContent = e.message;
    } finally {
      btn.disabled = false; btn.textContent = 'Entrar →';
    }
  }

  function doLogout() {
    if (token) fetch('/auth/logout', { method: 'POST', headers: authHeaders() }).catch(() => {});
    token = null; currentUser = null;
    sessionStorage.removeItem('mz_token');
    $('login-overlay').classList.remove('hidden');
  }

  async function restoreSession() {
    if (!token) return;
    try {
      const data = await api('GET', '/auth/me');
      if (!data) return;
      currentUser = data.user;
      showApp();
    } catch {
      doLogout();
    }
  }

  function showApp() {
    $('login-overlay').classList.add('hidden');
    $('lbl-user').textContent = currentUser ? currentUser.username : '—';
    loadTab(activeTab);
  }

  function loadTab(name) {
    activeTab = name;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === name));
    const c = $('content');
    c.innerHTML = '<div class="loading">Cargando…</div>';
    if (name === 'users') tabUsers(c);
    else tabClients(c);
  }

  async function tabUsers(c) {
    try {
      const data = await api('GET', '/api/v1/admin/users');
      if (!data) return;
      const users = data.users || [];
      c.innerHTML = `<div class="hint">Usuarios con acceso a este panel de gestión web (no es OpsCenter).</div>
        <div class="card">
        <div class="card-head">
          <div><div class="card-title">Usuarios admin</div><div class="card-sub">${users.length} usuario(s)</div></div>
          <button class="btn primary sm" id="btn-new-user">+ Nuevo usuario</button>
        </div>
        ${users.length ? `<table class="tbl">
          <thead><tr><th>Usuario</th><th>Email</th><th>Rol</th><th>Creado</th><th></th></tr></thead>
          <tbody id="users-tbody">${users.map(u => userRow(u)).join('')}</tbody>
        </table>` : '<div class="empty">No hay usuarios.</div>'}
      </div>`;
      $('btn-new-user').onclick = openNewUserModal;
      bindDeleteButtons();
    } catch (e) {
      c.innerHTML = `<div class="card"><div class="empty">${escHtml(e.message)}</div></div>`;
    }
  }

  function userRow(u) {
    const isSelf = currentUser && u.user_id === currentUser.user_id;
    return `<tr id="ur-${u.user_id}">
      <td><strong>${escHtml(u.username)}</strong></td>
      <td>${escHtml(u.email || '—')}</td>
      <td><span class="badge">${escHtml(u.role || '—')}</span></td>
      <td>${dateStr(u.created_at)}</td>
      <td>${isSelf ? '' : `<button class="btn danger sm del-user-btn" data-id="${u.user_id}" data-name="${escHtml(u.username)}">Eliminar</button>`}</td>
    </tr>`;
  }

  function bindDeleteButtons() {
    document.querySelectorAll('.del-user-btn').forEach(btn => {
      btn.onclick = () => doDeleteUser(btn.dataset.id, btn.dataset.name);
    });
  }

  function openNewUserModal() {
    $('new-username').value = '';
    $('new-email').value = '';
    $('new-password').value = '';
    $('new-role').value = 'admin';
    $('new-user-error').textContent = '';
    $('modal-user').classList.remove('hidden');
    $('new-username').focus();
  }

  async function doCreateUser() {
    const username = $('new-username').value.trim();
    const email = $('new-email').value.trim();
    const password = $('new-password').value;
    const role = $('new-role').value;
    $('new-user-error').textContent = '';
    if (!username || !password) { $('new-user-error').textContent = 'Usuario y contraseña son obligatorios.'; return; }
    const btn = $('modal-confirm');
    btn.disabled = true; btn.textContent = 'Creando…';
    try {
      const data = await api('POST', '/api/v1/admin/users', { username, email, password, role });
      if (!data) return;
      $('modal-user').classList.add('hidden');
      toast('Usuario creado', 'ok');
      loadTab('users');
    } catch (e) { $('new-user-error').textContent = e.message; }
    finally { btn.disabled = false; btn.textContent = 'Crear usuario'; }
  }

  async function doDeleteUser(userId, username) {
    if (!confirm(`¿Eliminar al usuario "${username}"?`)) return;
    try {
      await api('DELETE', `/api/v1/admin/users/${userId}`);
      toast('Usuario eliminado');
      $(`ur-${userId}`)?.remove();
    } catch (e) { toast(e.message, 'err'); }
  }

  async function tabClients(c) {
    try {
      const data = await api('GET', '/api/v1/admin/clients');
      if (!data) return;
      const clients = data.clients || [];
      c.innerHTML = `<div class="hint">Altas y bajas de clientes del portal (/client). Facturación y agentes: proyecto OpsCenter.</div>
        <div class="card">
        <div class="card-head">
          <div><div class="card-title">Clientes del portal</div><div class="card-sub">${clients.length} cliente(s)</div></div>
          <button class="btn primary sm" id="btn-new-client">+ Nuevo cliente</button>
        </div>
        ${clients.length ? `<table class="tbl">
          <thead><tr><th>Negocio</th><th>Email</th><th>Plan</th><th>Creado</th><th></th></tr></thead>
          <tbody id="clients-tbody">${clients.map(cl => clientRow(cl)).join('')}</tbody>
        </table>` : '<div class="empty">No hay clientes todavía. Crea el primero.</div>'}
      </div>`;
      $('btn-new-client').onclick = openNewClientModal;
      bindClientDeleteButtons();
    } catch (e) {
      c.innerHTML = `<div class="card"><div class="empty">${escHtml(e.message)}</div></div>`;
    }
  }

  function clientRow(cl) {
    return `<tr id="cr-${cl.client_id}">
      <td><strong>${escHtml(cl.name)}</strong></td>
      <td>${escHtml(cl.email)}</td>
      <td><span class="badge">${escHtml(cl.plan || 'starter')}</span></td>
      <td>${dateStr(cl.created_at)}</td>
      <td><button class="btn danger sm del-client-btn" data-id="${cl.client_id}" data-name="${escHtml(cl.name)}">Eliminar</button></td>
    </tr>`;
  }

  function bindClientDeleteButtons() {
    document.querySelectorAll('.del-client-btn').forEach(btn => {
      btn.onclick = () => doDeleteClient(btn.dataset.id, btn.dataset.name);
    });
  }

  let _newClientModal = null;
  function openNewClientModal() {
    if (!_newClientModal) {
      const div = document.createElement('div');
      div.className = 'modal-bg';
      div.id = 'modal-client';
      div.innerHTML = `<div class="modal">
        <div class="modal-title">Nuevo cliente</div>
        <div class="form-group"><label>Nombre del negocio</label><input id="nc-name" type="text" placeholder="Panadería La Lupita" /></div>
        <div class="form-group"><label>Email</label><input id="nc-email" type="email" placeholder="hola@negocio.com" /></div>
        <div class="form-group"><label>Contraseña provisional</label><input id="nc-password" type="password" placeholder="••••••••" /></div>
        <div class="error-msg" id="nc-error"></div>
        <div class="modal-footer">
          <button class="btn ghost" id="nc-cancel">Cancelar</button>
          <button class="btn primary" id="nc-confirm">Crear cliente</button>
        </div>
      </div>`;
      document.body.appendChild(div);
      _newClientModal = div;
      $('nc-cancel').onclick = () => div.classList.add('hidden');
      $('nc-confirm').onclick = doCreateClient;
      div.addEventListener('click', e => { if (e.target === div) div.classList.add('hidden'); });
    }
    $('nc-name').value = ''; $('nc-email').value = ''; $('nc-password').value = ''; $('nc-error').textContent = '';
    _newClientModal.classList.remove('hidden');
    $('nc-name').focus();
  }

  async function doCreateClient() {
    const name = $('nc-name').value.trim();
    const email = $('nc-email').value.trim();
    const password = $('nc-password').value;
    $('nc-error').textContent = '';
    if (!name || !email || !password) { $('nc-error').textContent = 'Todos los campos son obligatorios.'; return; }
    const btn = $('nc-confirm');
    btn.disabled = true; btn.textContent = 'Creando…';
    try {
      const data = await api('POST', '/api/v1/admin/clients', { name, email, password });
      if (!data) return;
      _newClientModal.classList.add('hidden');
      toast('Cliente creado', 'ok');
      loadTab('clients');
    } catch (e) { $('nc-error').textContent = e.message; }
    finally { btn.disabled = false; btn.textContent = 'Crear cliente'; }
  }

  async function doDeleteClient(clientId, name) {
    if (!confirm(`¿Eliminar al cliente "${name}"? Se perderán sus automatizaciones.`)) return;
    try {
      await api('DELETE', `/api/v1/admin/clients/${clientId}`);
      toast('Cliente eliminado');
      $(`cr-${clientId}`)?.remove();
    } catch (e) { toast(e.message, 'err'); }
  }

  $('btn-login').onclick = doLogin;
  $('inp-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  $('btn-logout').onclick = doLogout;
  $('modal-cancel').onclick = () => $('modal-user').classList.add('hidden');
  $('modal-confirm').onclick = doCreateUser;
  document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => loadTab(t.dataset.tab);
  });

  restoreSession();
})();
</script>
</body>
</html>
